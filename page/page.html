<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <title>智慧堆场 · Vue3 全功能管理系统</title>
  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- ECharts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: #060b14;
      color: #e0e5f0;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      height: 100vh;
    }

    /* 登录覆盖层 */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4, 8, 18, 0.96);
      backdrop-filter: blur(24px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s;
    }

    .auth-card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(59, 130, 246, 0.35);
      border-radius: 36px;
      padding: 38px 32px;
      width: 420px;
      box-shadow: 0 35px 60px rgba(0, 0, 0, 0.8);
    }

    .auth-tabs {
      display: flex;
      gap: 28px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .auth-tab {
      font-size: 1.4rem;
      font-weight: 650;
      color: #7c8ba0;
      cursor: pointer;
      padding-bottom: 8px;
      border-bottom: 3px solid transparent;
      transition: 0.25s;
    }

    .auth-tab.active {
      color: white;
      border-bottom-color: #3b82f6;
    }

    .auth-input {
      width: 100%;
      background: #1a2740;
      border: 1px solid #2d3f60;
      border-radius: 18px;
      padding: 14px 18px;
      margin: 13px 0;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    .auth-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 16px rgba(37, 99, 235, 0.5);
    }

    .auth-btn {
      width: 100%;
      background: linear-gradient(135deg, #2563eb, #1e40af);
      border: none;
      padding: 15px;
      border-radius: 34px;
      font-weight: bold;
      color: white;
      font-size: 1.15rem;
      margin-top: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .auth-btn:hover {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.5);
    }

    .auth-message {
      color: #fbbf24;
      margin-top: 18px;
      text-align: center;
    }

    /* 主布局 */
    .dashboard {
      display: grid;
      grid-template-columns: 270px 1fr 340px;
      grid-template-rows: 70px 1fr 1fr;
      gap: 14px;
      padding: 14px;
      height: 100vh;
    }

    .sidebar {
      grid-row: 1 / 4;
      background: rgba(12, 20, 35, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding-left: 8px;
    }

    .logo-icon {
      font-size: 34px;
      color: #3b82f6;
    }

    .logo-text {
      font-weight: 700;
      font-size: 1.4rem;
      background: linear-gradient(to right, #bfdbfe, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-menu {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
    }

    .nav-item {
      padding: 12px 16px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      color: #b7c3d6;
      font-weight: 500;
      transition: all 0.25s;
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      font-size: 0.95rem;
    }

    .nav-item i {
      width: 24px;
      color: #5b7ec2;
    }

    .nav-item:hover {
      background: rgba(37, 99, 235, 0.2);
      color: white;
    }

    .nav-item.active {
      background: linear-gradient(135deg, #15315c, #0b1a34);
      color: white;
      border-left: 4px solid #3b82f6;
    }

    .user-profile {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 6px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .top-bar {
      grid-column: 2 / 4;
      background: rgba(14, 22, 38, 0.8);
      backdrop-filter: blur(22px);
      border-radius: 32px;
      padding: 0 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .map-section {
      background: rgba(10, 18, 32, 0.75);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(74, 144, 226, 0.25);
    }

    .yard-chart {
      flex: 1;
      width: 100%;
      border-radius: 20px;
    }

    .dynamic-panel {
      background: rgba(10, 18, 32, 0.75);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      border: 1px solid rgba(234, 179, 8, 0.2);
    }

    .list-container {
      flex: 1;
      overflow-y: auto;
      margin-top: 10px;
    }

    .card-item {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
      border-left: 4px solid #3b82f6;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stats-section {
      background: rgba(12, 20, 35, 0.7);
      backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .kpi-row {
      display: flex;
      gap: 12px;
    }

    .kpi-card {
      background: #0f1a2b;
      border-radius: 18px;
      padding: 12px 8px;
      flex: 1;
      text-align: center;
      font-weight: 600;
    }

    .chart-box {
      flex: 1;
      min-height: 0;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 18px;
    }

    button {
      cursor: pointer;
    }

    .fade-enter-active, .fade-leave-active {
      transition: opacity 0.3s;
    }
    .fade-enter-from, .fade-leave-to {
      opacity: 0;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- 登录界面 -->
  <div v-if="!isLoggedIn" class="auth-overlay">
    <div class="auth-card">
      <div class="auth-tabs">
        <span :class="['auth-tab', { active: authMode === 'login' }]" @click="authMode='login'; authMsg=''">🔐 登录</span>
        <span :class="['auth-tab', { active: authMode === 'register' }]" @click="authMode='register'; authMsg=''">📝 注册</span>
      </div>
      <div v-if="authMode === 'login'">
        <input class="auth-input" v-model="loginForm.username" placeholder="用户名">
        <input class="auth-input" v-model="loginForm.password" type="password" placeholder="密码">
        <button class="auth-btn" @click="handleLogin">登 录</button>
      </div>
      <div v-else>
        <input class="auth-input" v-model="registerForm.username" placeholder="设置用户名">
        <input class="auth-input" v-model="registerForm.password" type="password" placeholder="设置密码">
        <input class="auth-input" v-model="registerForm.confirm" type="password" placeholder="确认密码">
        <button class="auth-btn" @click="handleRegister">注 册</button>
      </div>
      <div class="auth-message" v-if="authMsg">{{ authMsg }}</div>
    </div>
  </div>

  <!-- 主系统 -->
  <div v-else class="dashboard">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="logo-area">
        <i class="fas fa-dharmachakra logo-icon"></i>
        <span class="logo-text">智港堆场</span>
      </div>
      <nav class="nav-menu">
        <button v-for="item in menuItems" :key="item.view"
                :class="['nav-item', { active: currentView === item.view }]"
                @click="switchView(item.view)">
          <i :class="item.icon"></i> {{ item.label }}
        </button>
      </nav>
      <div class="user-profile">
        <i class="fas fa-user-astronaut" style="font-size:2.2rem; color:#3b82f6;"></i>
        <div>
          <div style="font-weight:bold;">{{ currentUser.name }}</div>
          <small style="color:#93c5fd;">{{ currentUser.role }}</small>
        </div>
        <button @click="logout" style="margin-left:auto; background:#7f1d1d; padding:6px 16px; border-radius:24px; color:white;">退出</button>
      </div>
    </aside>

    <!-- 顶部栏 -->
    <header class="top-bar">
      <span style="font-weight:650; font-size:1.3rem;">{{ viewTitle }}</span>
      <div>
        <span style="color:#10b981;">●</span> 在线
        <button @click="refreshData" style="background:#1e3a5f; border-radius:28px; padding:7px 20px; margin-left:20px;">
          <i class="fas fa-sync-alt"></i> 刷新
        </button>
      </div>
    </header>

    <!-- 地图区域 -->
    <section class="map-section">
      <div style="display:flex; justify-content:space-between;">
        <span><i class="fas fa-vector-square"></i> 堆场实时占用</span>
        <span style="color:#60a5fa;">区块 A1-G8</span>
      </div>
      <div class="yard-chart" ref="yardChartRef"></div>
    </section>

    <!-- 动态面板 -->
    <section class="dynamic-panel">
      <div style="font-weight:bold; margin-bottom:6px;">{{ panelTitle }}</div>
      <div class="list-container">
        <div v-for="item in panelData" :key="item.id || item.name" class="card-item">
          <i :class="item.icon || 'fas fa-info-circle'"></i>
          <div style="flex:1;">
            <strong>{{ item.primary }}</strong>
            <div style="font-size:0.8rem; color:#94a3b8;">{{ item.secondary }}</div>
          </div>
          <span v-if="item.badge" style="color:#fbbf24;">{{ item.badge }}</span>
        </div>
      </div>
    </section>

    <!-- 统计区域 -->
    <aside class="stats-section">
      <div class="kpi-row">
        <div class="kpi-card"><span style="color:#a0c0f0;">📦 总箱量</span><br><strong>{{ dashboardData.totalBoxes }}</strong></div>
        <div class="kpi-card"><span style="color:#fbbf24;">🔄 周转率</span><br><strong>{{ dashboardData.turnoverRate }}%</strong></div>
      </div>
      <div class="chart-box" ref="pieChartRef"></div>
      <div class="chart-box" ref="barChartRef"></div>
    </aside>
  </div>
</div>

<script>
  const { createApp, ref, reactive, computed, onMounted, nextTick, watch } = Vue;

  createApp({
    setup() {
      // ---------- 状态管理 ----------
      const isLoggedIn = ref(false);
      const authMode = ref('login');
      const authMsg = ref('');
      const currentUser = reactive({ name: '', role: '' });
      
      const loginForm = reactive({ username: 'admin', password: '123456' });
      const registerForm = reactive({ username: '', password: '', confirm: '' });

      const currentView = ref('home');
      const dashboardData = reactive({
        totalBoxes: 0,
        turnoverRate: 0,
        yardOccupancy: {},
        tasks: [],
        categoryStats: {},
        weeklyThroughput: []
      });

      // 图表refs
      const yardChartRef = ref(null);
      const pieChartRef = ref(null);
      const barChartRef = ref(null);
      let yardChart, pieChart, barChart;

      // 模拟用户数据库
      const usersDB = new Map([
        ['admin', { password: '123456', role: '超级管理员' }],
        ['operator', { password: '123456', role: '操作员' }]
      ]);

      // 菜单项
      const menuItems = [
        { view: 'home', label: '首页大屏', icon: 'fas fa-th-large' },
        { view: 'yard', label: '堆场地图', icon: 'fas fa-map-marked-alt' },
        { view: 'tasks', label: '任务状态', icon: 'fas fa-tasks' },
        { view: 'stats', label: '数据统计', icon: 'fas fa-chart-pie' },
        { view: 'ship', label: '船舶计划', icon: 'fas fa-ship' },
        { view: 'container', label: '集装箱管理', icon: 'fas fa-box' },
        { view: 'yard-mgr', label: '堆场管理', icon: 'fas fa-warehouse' },
        { view: 'job', label: '作业任务', icon: 'fas fa-clipboard-list' },
        { view: 'admin', label: '权限管理', icon: 'fas fa-shield-alt' }
      ];

      // 视图标题
      const viewTitleMap = {
        home: '🏠 首页综合大屏', yard: '🗺️ 堆场地图可视化', tasks: '📋 任务状态大屏',
        stats: '📈 数据统计可视化', ship: '🚢 船舶计划管理', container: '📦 集装箱管理',
        'yard-mgr': '🏗️ 堆场管理', job: '🔧 作业任务管理', admin: '🔐 权限管理'
      };

      const viewTitle = computed(() => viewTitleMap[currentView.value] || currentView.value);

      // 模拟API
      const mockAPI = {
        getDashboard() {
          return {
            totalBoxes: 1328 + Math.floor(Math.random() * 25),
            turnoverRate: 86 + Math.floor(Math.random() * 7),
            yardOccupancy: {
              A1: 78, A2: 45, B1: 92, B2: 30, C1: 65, C2: 88,
              D1: 15, D2: 57, E1: 83, E2: 41, F1: 70, G1: 22
            },
            tasks: [
              { id: 'T-1042', type: '卸箱', location: 'B2-05', progress: 72, assignee: '李师傅' },
              { id: 'T-1043', type: '装箱', location: 'A1-12', progress: 45, assignee: '王操作' },
              { id: 'T-1044', type: '移箱', location: 'C2-09', progress: 91, assignee: '张吊机' },
              { id: 'T-1045', type: '查验', location: 'D1-03', progress: 20, assignee: '赵检验' }
            ],
            categoryStats: { 普通箱: 645, 冷藏箱: 208, 危品箱: 82, 空箱: 345 },
            weeklyThroughput: [120, 145, 132, 165, 158, 172, 148]
          };
        },
        getShips() {
          return [
            { name: '中远海运星', berth: 'A3', eta: '2026-05-29 08:30', containers: 320, status: '待靠泊' },
            { name: '马士基北极', berth: 'B1', eta: '2026-05-30 14:00', containers: 450, status: '在途' }
          ];
        },
        getContainers() {
          return [
            { id: 'CNIU2345678', type: '普通', location: 'A1-05', status: '在港' },
            { id: 'TGHU8765432', type: '冷藏', location: 'C2-03', status: '待检' }
          ];
        },
        getYardMgmt() {
          return { zones: ['A1','A2','B1','B2','C1','C2'], freeSlots: 138, utilization: 78.5 };
        },
        getJobs() {
          return [
            { id: 'JOB-1001', action: '吊装', container: 'CNIU2345678', from: 'A1', to: 'B2', progress: 60 },
            { id: 'JOB-1002', action: '搬运', container: 'TGHU8765432', from: 'C2', to: 'D1', progress: 30 }
          ];
        },
        getUsers() {
          return Array.from(usersDB.entries()).map(([name, info]) => ({
            name, role: info.role, permissions: info.role === '超级管理员' ? ['全部'] : ['地图','任务']
          }));
        }
      };

      // 面板数据
      const panelTitle = ref('📋 任务队列');
      const panelData = ref([]);

      // 认证方法
      const handleLogin = () => {
        const { username, password } = loginForm;
        if (!username || !password) { authMsg.value = '请输入完整信息'; return; }
        const user = usersDB.get(username);
        if (user && user.password === password) {
          currentUser.name = username;
          currentUser.role = user.role;
          isLoggedIn.value = true;
          authMsg.value = '';
          nextTick(() => {
            initCharts();
            switchView('home');
          });
        } else {
          authMsg.value = '用户名或密码错误';
        }
      };

      const handleRegister = () => {
        const { username, password, confirm } = registerForm;
        if (!username || !password) { authMsg.value = '请填写完整'; return; }
        if (password !== confirm) { authMsg.value = '密码不一致'; return; }
        if (usersDB.has(username)) { authMsg.value = '用户已存在'; return; }
        usersDB.set(username, { password, role: '操作员' });
        authMsg.value = '注册成功，请登录';
        authMode.value = 'login';
        registerForm.username = '';
        registerForm.password = '';
        registerForm.confirm = '';
      };

      const logout = () => {
        isLoggedIn.value = false;
        currentUser.name = '';
        currentUser.role = '';
      };

      // 图表初始化
      const initCharts = () => {
        if (yardChartRef.value && !yardChart) {
          yardChart = echarts.init(yardChartRef.value);
        }
        if (pieChartRef.value && !pieChart) {
          pieChart = echarts.init(pieChartRef.value);
        }
        if (barChartRef.value && !barChart) {
          barChart = echarts.init(barChartRef.value);
        }
      };

      const renderYardMap = (data) => {
        if (!yardChart) return;
        const occ = data.yardOccupancy || {};
        const keys = Object.keys(occ);
        yardChart.setOption({
          grid: { top: 20, bottom: 20, left: 30, right: 30 },
          xAxis: { show: false, max: 650 },
          yAxis: { show: false, max: 420 },
          series: [{
            type: 'scatter',
            symbolSize: val => Math.max(20, val[2] * 0.9),
            data: keys.map((name, idx) => ({
              name,
              value: [(idx % 4) * 145 + 55, Math.floor(idx / 4) * 105 + 45, occ[name]]
            })),
            itemStyle: {
              color: param => {
                const v = param.value[2];
                return v > 80 ? '#ef4444' : v > 50 ? '#f59e0b' : '#10b981';
              }
            },
            label: { show: true, formatter: '{b}', position: 'inside', color: '#fff', fontSize: 10 }
          }]
        });
      };

      const renderStatsCharts = (data) => {
        if (!pieChart || !barChart) return;
        pieChart.setOption({
          title: { text: '箱型分布', left: 'center', textStyle: { color: '#cbd5e1', fontSize: 12 } },
          series: [{
            type: 'pie', radius: ['45%', '72%'],
            data: Object.entries(data.categoryStats || {}).map(([k, v]) => ({ name: k, value: v }))
          }]
        });
        barChart.setOption({
          title: { text: '周吞吐量', left: 'center', textStyle: { color: '#cbd5e1', fontSize: 12 } },
          xAxis: { data: ['周一','周二','周三','周四','周五','周六','周日'], axisLabel: { color: '#aaa', fontSize: 8 } },
          yAxis: { show: false },
          series: [{ type: 'bar', data: data.weeklyThroughput || [], itemStyle: { color: '#3b82f6' } }]
        });
      };

      // 视图切换
      const switchView = (view) => {
        currentView.value = view;
        const data = mockAPI.getDashboard();
        Object.assign(dashboardData, data);
        
        nextTick(() => {
          renderYardMap(data);
          renderStatsCharts(data);
        });

        // 根据视图更新面板
        switch (view) {
          case 'ship':
            panelTitle.value = '🚢 船舶计划';
            panelData.value = mockAPI.getShips().map(s => ({
              icon: 'fas fa-ship', primary: s.name, secondary: `泊位${s.berth} ETA:${s.eta} (${s.containers}箱)`, badge: s.status
            }));
            break;
          case 'container':
            panelTitle.value = '📦 集装箱清单';
            panelData.value = mockAPI.getContainers().map(c => ({
              icon: 'fas fa-box', primary: c.id, secondary: `[${c.type}] 📍${c.location}`, badge: c.status
            }));
            break;
          case 'yard-mgr':
            panelTitle.value = '🏗️ 堆场概况';
            const yard = mockAPI.getYardMgmt();
            panelData.value = [
              { icon: 'fas fa-th', primary: '可用区域', secondary: yard.zones.join(', ') },
              { icon: 'fas fa-chart-line', primary: '空闲槽位', secondary: `${yard.freeSlots} | 利用率${yard.utilization}%` }
            ];
            break;
          case 'job':
            panelTitle.value = '🔧 作业任务';
            panelData.value = mockAPI.getJobs().map(j => ({
              icon: 'fas fa-cogs', primary: `${j.id} ${j.action}`, secondary: `${j.container} (${j.from}→${j.to}) 进度${j.progress}%`
            }));
            break;
          case 'admin':
            panelTitle.value = '👥 用户权限';
            panelData.value = mockAPI.getUsers().map(u => ({
              icon: 'fas fa-user-shield', primary: u.name, secondary: `${u.role} - 权限: ${u.permissions.join(', ')}`
            }));
            break;
          default:
            panelTitle.value = '📋 任务队列';
            panelData.value = data.tasks.map(t => ({
              icon: 'fas fa-spinner', primary: `${t.id} · ${t.type}`, secondary: `📍${t.location} 👤${t.assignee}`, badge: `${t.progress}%`
            }));
        }
      };

      const refreshData = () => {
        switchView(currentView.value);
      };

      // 窗口自适应
      window.addEventListener('resize', () => {
        yardChart?.resize();
        pieChart?.resize();
        barChart?.resize();
      });

      return {
        isLoggedIn, authMode, authMsg, currentUser,
        loginForm, registerForm,
        handleLogin, handleRegister, logout,
        currentView, menuItems, viewTitle,
        dashboardData, panelTitle, panelData,
        switchView, refreshData,
        yardChartRef, pieChartRef, barChartRef
      };
    }
  }).mount('#app');
</script>
